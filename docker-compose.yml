services:
  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: success_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  
  redis:
    image: redis:7-alpine
    container_name: redis_cache
    ports:
      - "6379:6379"
    restart: always

  adminer:
    image: adminer
    restart: always
    ports:
      - 8080:8080


  app:
    build: .
    container_name: fastapi_app
    restart: always
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # база доступна не по localhost, а по имени сервиса 'db'
      DATABASE_URL: postgresql://user:password@db:5432/success_db
      REDIS_HOST: redis
  worker:
    build: .
    container_name: celery_worker
    command: celery -A core.celery_config.celery_app worker --loglevel=info
    depends_on:
      - redis
      - db
    environment:
      - REDIS_URL=redis://redis:6379/0
      - PYTHONUNBUFFERED=1
    env_file:
      - .env

volumes:
  postgres_data: