<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация | Success Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen font-['Inter']">
    <div class="bg-white p-8 rounded-[2.5rem] shadow-xl shadow-slate-200 w-full max-w-md border border-slate-100">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black text-indigo-600 tracking-tighter">SUCCESS<span class="text-slate-300">.</span></h1>
            <p class="text-slate-400 font-medium mt-2">Создайте новый аккаунт</p>
        </div>
        
        <script>
            async function handleSignup(event) {
                event.preventDefault();
                const formData = new FormData(event.target);
                const data = Object.fromEntries(formData.entries());
            
                const response = await fetch('/auth/signup', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
            
                const result = await response.json();
            
                if (response.ok) {
                    alert('Регистрация успешна! Теперь войдите в аккаунт.');
                    window.location.href = '/login'; // Перенаправляем на вход
                } else {
                    alert('Ошибка: ' + (result.detail || 'Не удалось зарегистрироваться'));
                }
            }
            </script>
            
            <form onsubmit="handleSignup(event)" class="space-y-6">
                <input type="text" name="username" required ...>
                <input type="password" name="password" required ...>
                
                <button type="submit" ...>Зарегистрироваться</button>
            </form>
        <div class="mt-6 text-center">
            <a href="/login" class="text-sm font-semibold text-indigo-500 hover:text-indigo-700">Уже есть аккаунт? Войти</a>
        </div>
    </div>
</body>
</html>
