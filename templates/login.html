<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход | Success Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen font-['Inter']">
    <div class="bg-white p-8 rounded-[2.5rem] shadow-xl shadow-slate-200 w-full max-w-md border border-slate-100">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black text-indigo-600 tracking-tighter">SUCCESS<span class="text-slate-300">.</span></h1>
            <p class="text-slate-400 font-medium mt-2">Войдите в свой аккаунт</p>
        </div>
        
        <script>
            async function handleLogin(event) {
                event.preventDefault();
                const formData = new FormData(event.target);
                const data = Object.fromEntries(formData.entries());
            
                const response = await fetch('/auth/signin', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
            
                if (response.ok) {
                    window.location.href = '/'; // Редирект на стороне клиента
                } else {
                    alert('Ошибка входа!');
                }
            }
            </script>
            
            <form onsubmit="handleLogin(event)" class="space-y-6">
                <input type="text" name="username" ... >
                <input type="password" name="password" ... >
                <button type="submit" ... >Войти</button>
            </form>
    </div>
</body>
</html>
